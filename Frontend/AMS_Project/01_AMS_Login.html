<!DOCTYPE html>
<!-- ============================================================
     AMS — 3TagaPayu Attendance Management System
     FILE: 01_AMS_Login.html — Login Page
     ============================================================ -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMS Login — 3TagaPayu</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <!-- ============================================================
       Page Loader — DBTC Logo
       Source: Custom / DBTC Logo Asset
       ============================================================ -->
  <div id="page-loader">
    <div class="loader-logo" style="background-image: url('assets/images/DBTC_Logo.png');"></div>
    <p class="loader-text">Loading…</p>
  </div>

  <!-- ============================================================
       Dark Mode Toggle — BB8
       Source: Uiverse.io by Galahhad
       Link: https://uiverse.io/Galahhad/
       ============================================================ -->
  <input type="checkbox" id="darkmode-toggle" />

  <!-- BB8 Toggle fixed top-right -->
  <div class="darkmode-wrap">
    <label class="bb8-toggle" for="darkmode-toggle">
      <div class="bb8-toggle__container">
        <div class="bb8-toggle__scenery">
          <div class="bb8-toggle__star"></div>
          <div class="bb8-toggle__star"></div>
          <div class="bb8-toggle__star"></div>
          <div class="bb8-toggle__star"></div>
          <div class="bb8-toggle__star"></div>
          <div class="bb8-toggle__star"></div>
          <div class="bb8-toggle__star"></div>
          <div class="tatto-1"></div>
          <div class="tatto-2"></div>
          <div class="gomrassen"></div>
          <div class="hermes"></div>
          <div class="chenini"></div>
          <div class="bb8-toggle__cloud"></div>
          <div class="bb8-toggle__cloud"></div>
          <div class="bb8-toggle__cloud"></div>
        </div>
        <div class="bb8">
          <div class="bb8__head-container">
            <div class="bb8__antenna"></div>
            <div class="bb8__antenna"></div>
            <div class="bb8__head"></div>
          </div>
          <div class="bb8__body"></div>
        </div>
        <div class="artificial__hidden">
          <div class="bb8__shadow"></div>
        </div>
      </div>
    </label>
  </div>

  <!-- Background -->
  <div class="bg-image" style="background-image: url('assets/images/Background.png');"></div>
  <div class="bg-overlay"></div>

  <!-- School Badge top-left -->
  <div class="school-badge">
    <div class="school-logo">
      <img src="assets/images/DBTC_Logo.png" alt="DBTC Logo" />
    </div>
    <div class="school-info">
      <h2>Don Bosco Technical College</h2>
      <p>Mandaluyong City</p>
    </div>
  </div>

  <!-- Quote bottom-left -->
  <div class="quote">
    <blockquote>"The Lord is my shepherd, I shall not fear."</blockquote>
    <cite>— Psalm 23:1</cite>
  </div>

  <!-- Login Page wrapper -->
  <div class="login-page">
    <div class="login-container">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-logo">
          <img src="assets/images/DBTC_Logo.png" alt="AMS Logo" />
        </div>
        <h1>3TagaPayu AMS</h1>
        <p>Attendance Management System</p>
      </div>

      <!-- Login Card -->
      <div class="login-card">

        <!-- ============================================================
             Role Tab Switcher — Radio Glider
             Source: Uiverse.io by Pradeepsaranbishnoi
             Link: https://uiverse.io/Pradeepsaranbishnoi/
             Radio inputs are direct siblings of panels — pure CSS, no JS
             ============================================================ -->
        <input type="radio" id="radio-1" name="role-tabs" checked />
        <input type="radio" id="radio-2" name="role-tabs" />

        <!-- Glider Tabs -->
        <div class="tab-wrapper">
          <div class="tabs">
            <label class="tab" for="radio-1">
              <img src="assets/images/Teacher_logo.png" alt="" />
              Admin
            </label>
            <label class="tab" for="radio-2">
              <img src="assets/images/student_logo.png" alt="" />
              Teacher
            </label>
            <span class="glider"></span>
          </div>
        </div>

        <!-- Admin Panel -->
        <div class="form-panel" id="panel-admin">
          <div class="login-field">
            <label>Username</label>
            <input type="text" placeholder="Enter admin username" autocomplete="username" />
          </div>
          <div class="login-field">
            <label>Password</label>
            <input type="password" placeholder="Enter password" autocomplete="current-password" />
          </div>
          <a href="02_Admin_Attendance.html" class="btn-login">Sign In as Admin</a>
        </div>

        <!-- Teacher Panel -->
        <div class="form-panel" id="panel-teacher">
          <div class="login-field">
            <label>Teacher ID</label>
            <input type="text" placeholder="Enter teacher ID" autocomplete="username" />
          </div>
          <div class="login-field">
            <label>Password</label>
            <input type="password" placeholder="Enter password" autocomplete="current-password" />
          </div>
          <a href="06_Teacher_Attendance.html" class="btn-login teal-btn">Sign In as Teacher</a>
        </div>

      </div><!-- /login-card -->
    </div><!-- /login-container -->
  </div><!-- /login-page -->

</body>
</html>
